<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>串珠作品詳細教學</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* 專門為內容頁設計的樣式 (與 resin.html 相同，保持一致性) */
        .content-block {
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }
        .content-block h3 {
            font-size: 1.8rem;
            color: #ff99b3;
            border-bottom: 2px solid #ffde59;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .content-block ol {
            padding-left: 25px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 30px;">
            <h1>串珠作品詳情與步驟</h1>
            <p>詳細介紹您選擇的串珠作品教學</p>
        </header>

        <div id="flower-earring" class="content-block">
            <h3>粉嫩小花耳環製作步驟</h3>
            <p>這款作品使用 T 針和 4mm 米珠，是練習串珠結構的基礎。</p>
            <h4>步驟細節</h4>
            <ol>
                <li>使用 T 針串入一顆黃色中心珠，接著五顆花瓣珠。</li>
                <li>將線穿回第一顆花瓣珠，拉緊形成小花。</li>
                <li>將 T 針彎曲打圈，套上耳勾即可。</li>
            </ol>
        </div>

        <div id="phone-strap" class="content-block">
            <h3>撞色手機掛繩製作步驟</h3>
            <p>（請在此填寫撞色手機掛繩的詳細教學）</p>
        </div>

        <div id="pearl-bracelet" class="content-block">
            <h3>簡約珍珠手鍊製作步驟</h3>
            <p>（請在此填寫簡約珍珠手鍊的詳細教學）</p>
        </div>

        <a href="index.html#beads-section" class="menu-btn back-btn">回串珠作品集</a>
    </div>
</body>
</html>
